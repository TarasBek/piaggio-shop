<section class="profile-page">
  <div class="profile-grid">
    <form class="profile-card" (ngSubmit)="saveProfile()">
      <h1>My Account</h1>
      <p>Customer details used for delivery and contact.</p>

      <label for="profile-first-name">First name</label>
      <input id="profile-first-name" name="firstName" [(ngModel)]="profile.firstName" required />

      <label for="profile-last-name">Last name</label>
      <input id="profile-last-name" name="lastName" [(ngModel)]="profile.lastName" required />

      <label for="profile-email">Email</label>
      <input
        id="profile-email"
        name="email"
        type="email"
        [(ngModel)]="profile.email"
        readonly
      />

      <label for="profile-phone">Telephone</label>
      <input id="profile-phone" name="phone" type="tel" [(ngModel)]="profile.phone" required />

      <label for="profile-address1">Home address</label>
      <input id="profile-address1" name="addressLine1" [(ngModel)]="profile.addressLine1" required />

  
      <label for="profile-city">City</label>
      <input id="profile-city" name="city" [(ngModel)]="profile.city" required />

      <label for="profile-postal-code">Postal code</label>
      <input id="profile-postal-code" name="postalCode" [(ngModel)]="profile.postalCode" required />

      <label for="profile-country">Country</label>
      <input id="profile-country" name="country" [(ngModel)]="profile.country" required />

      <button type="submit">Save profile</button>
      <div class="error" *ngIf="profileError">{{ profileError }}</div>
      <div class="success" *ngIf="profileMessage">{{ profileMessage }}</div>
    </form>

    <form class="profile-card password-card" (ngSubmit)="updatePassword()">
      <h2>Change Password</h2>
      <p>Update your login password.</p>

      <div class="password-grid">
        <div class="field">
          <label for="current-password">Current password</label>
          <input
            id="current-password"
            name="currentPassword"
            type="password"
            [(ngModel)]="currentPassword"
            required
          />
        </div>

        <div class="field">
          <label for="new-password">New password</label>
          <input
            id="new-password"
            name="newPassword"
            type="password"
            [(ngModel)]="newPassword"
            required
          />
        </div>

        <div class="field field-wide">
          <label for="confirm-new-password">Confirm new password</label>
          <input
            id="confirm-new-password"
            name="confirmNewPassword"
            type="password"
            [(ngModel)]="confirmNewPassword"
            required
          />
        </div>
      </div>

      <button type="submit" class="change-password-btn">Change password</button>
      <div class="password-feedback">
      <div class="error" *ngIf="passwordError">{{ passwordError }}</div>
      <div class="success" *ngIf="passwordMessage">{{ passwordMessage }}</div>
      </div>
      <button class="logout-btn" type="button" (click)="logout()">Log out</button>
    </form>
  </div>
</section>
